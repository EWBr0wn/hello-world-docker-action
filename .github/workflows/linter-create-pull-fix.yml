name: Auto-fix Linting Issues

on:
  workflow_dispatch:

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Prettier
        run: npx prettier --write .

      - name: Run ESLint
        run: npx eslint --fix "**/*.{js,ts,jsx,tsx}" || true
        continue-on-error: true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: auto-fix linting and formatting issues"
          committer: GitHub Actions <github-actions[bot]@users.noreply.github.com>
          author: GitHub Actions <github-actions[bot]@users.noreply.github.com>
          branch: auto-fix/linting-${{ github.ref_name }}
          delete-branch: true
          title: "🤖 Auto-fix: Linting and formatting issues"
          body: |
            ## Auto-fix Linting Issues
            
            This PR contains automatic fixes for linting and formatting issues.
            
            ### Changes Applied
            - ✨ Prettier formatting
            - 🔧 ESLint auto-fixes
            
            ### Base Branch
            `${{ github.ref_name }}`
            
            ---
            
            🤖 Auto-generated by workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: |
            automated
            linting
            auto-fix
          assignees: ${{ github.actor }}